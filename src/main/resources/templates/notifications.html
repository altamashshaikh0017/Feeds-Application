<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications — SpringFeeds</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #0a0a0f 0%, #0d0d1a 30%, #0a0f1a 60%, #0a0a0f 100%);
        min-height: 100vh;
        color: #fff;
        overflow-x: hidden;
    }

    .blob {
        position: fixed; border-radius: 50%; filter: blur(80px);
        opacity: 0.15; pointer-events: none; z-index: 0;
        animation: drift 18s ease-in-out infinite alternate;
    }
    .blob-1 { width: 520px; height: 520px; background: #6366f1; top: -140px; left: -140px; animation-delay: 0s; }
    .blob-2 { width: 380px; height: 380px; background: #8b5cf6; bottom: -100px; right: -100px; animation-delay: -7s; }
    .blob-3 { width: 280px; height: 280px; background: #06b6d4; top: 40%; left: 55%; animation-delay: -13s; }
    @keyframes drift {
        0%   { transform: translate(0, 0) scale(1); }
        100% { transform: translate(40px, 30px) scale(1.08); }
    }

    body::before {
        content: '';
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
        background-size: 28px 28px;
    }

    /* ── Navbar ── */
    .glass-nav {
        position: sticky; top: 0; z-index: 100;
        background: rgba(10,10,20,0.75);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(255,255,255,0.07);
        padding: 0 24px;
        height: 60px;
        display: flex; align-items: center; gap: 12px;
    }
    .nav-brand {
        font-size: 1.1rem; font-weight: 800;
        background: linear-gradient(135deg, #818cf8, #c084fc);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
        text-decoration: none;
        display: flex; align-items: center; gap: 8px;
    }
    .nav-brand-icon {
        width: 30px; height: 30px; border-radius: 8px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        display: flex; align-items: center; justify-content: center;
        font-size: 15px;
    }
    .nav-sep { color: rgba(255,255,255,0.15); font-size: 1.2rem; }
    .nav-label { font-size: 0.85rem; font-weight: 600; color: rgba(255,255,255,0.45); }
    .nav-spacer { flex: 1; }
    .nav-link-pill {
        font-size: 0.78rem; font-weight: 600; color: rgba(255,255,255,0.55);
        text-decoration: none; padding: 5px 12px; border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.1);
        transition: all 0.2s; white-space: nowrap;
    }
    .nav-link-pill:hover { color: #fff; background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
    .nav-bell {
        position: relative;
        display: flex; align-items: center; justify-content: center;
        width: 34px; height: 34px; border-radius: 50%;
        color: rgba(255,255,255,0.85);
        text-decoration: none;
        background: rgba(99,102,241,0.2);
        border: 1px solid rgba(99,102,241,0.4);
    }
    .bell-badge {
        position: absolute; top: 1px; right: 1px;
        min-width: 16px; height: 16px;
        background: #6366f1; color: #fff;
        font-size: 0.6rem; font-weight: 700;
        border-radius: 8px; padding: 0 4px;
        display: flex; align-items: center; justify-content: center;
    }
    .btn-logout {
        font-size: 0.78rem; font-weight: 600; color: rgba(255,100,100,0.8);
        text-decoration: none; padding: 5px 12px; border-radius: 20px;
        border: 1px solid rgba(255,100,100,0.2);
        transition: all 0.2s;
    }
    .btn-logout:hover { color: #fff; background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.4); }

    /* ── Page ── */
    .page-wrapper {
        position: relative; z-index: 1;
        max-width: 680px; margin: 0 auto;
        padding: 36px 20px 60px;
    }

    .page-header {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 24px;
    }
    .page-title {
        font-size: 1.4rem; font-weight: 800;
        background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    .btn-mark-all {
        font-size: 0.75rem; font-weight: 600; color: #818cf8;
        background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.25);
        border-radius: 20px; padding: 6px 14px; cursor: pointer;
        transition: all 0.2s; text-decoration: none;
    }
    .btn-mark-all:hover { background: rgba(99,102,241,0.2); color: #a5b4fc; }

    /* ── Notification card ── */
    .notif-list { display: flex; flex-direction: column; gap: 10px; }

    .notif-card {
        display: flex; align-items: flex-start; gap: 14px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 14px; padding: 16px 18px;
        transition: background 0.2s, border-color 0.2s;
        animation: fadeUp 0.35s ease both;
        text-decoration: none; color: inherit;
    }
    .notif-card:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.14); }
    .notif-card.unread {
        background: rgba(99,102,241,0.08);
        border-color: rgba(99,102,241,0.25);
    }
    .notif-card.unread:hover { background: rgba(99,102,241,0.13); }

    .notif-icon {
        width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        font-size: 18px;
    }
    .notif-icon.like    { background: rgba(239,68,68,0.15);  }
    .notif-icon.comment { background: rgba(99,102,241,0.15); }

    .notif-body { flex: 1; min-width: 0; }
    .notif-message {
        font-size: 0.88rem; font-weight: 500; color: rgba(255,255,255,0.85);
        line-height: 1.45;
    }
    .notif-card.unread .notif-message { color: #fff; font-weight: 600; }

    .notif-time {
        font-size: 0.74rem; color: rgba(255,255,255,0.35);
        margin-top: 4px;
    }

    .unread-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: #6366f1; flex-shrink: 0; margin-top: 6px;
    }

    /* ── Empty state ── */
    .empty-state {
        text-align: center; padding: 72px 24px;
        color: rgba(255,255,255,0.3);
    }
    .empty-icon { font-size: 3rem; margin-bottom: 14px; }
    .empty-title { font-size: 1rem; font-weight: 600; color: rgba(255,255,255,0.45); }
    .empty-sub   { font-size: 0.82rem; margin-top: 6px; }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
    }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<!-- ── Navbar ── -->
<nav class="glass-nav">
    <a href="/home" class="nav-brand">
        <div class="nav-brand-icon">✦</div>
        Feeds
    </a>
    <span class="nav-sep">/</span>
    <span class="nav-label">Notifications</span>

    <div class="nav-spacer"></div>

    <a href="/viewOtherUsersPosts" class="nav-link-pill">Explore</a>
    <a href="/viewPosts"           class="nav-link-pill">My Posts</a>
    <a href="/profile"             class="nav-link-pill">Profile</a>

    <a href="/notifications" class="nav-bell" title="Notifications">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="bell-badge" th:if="${unreadNotificationCount > 0}"
              th:text="${unreadNotificationCount > 99 ? '99+' : unreadNotificationCount}"></span>
    </a>

    <a href="/logout" class="btn-logout">Sign out</a>
</nav>

<!-- ── Page ── -->
<div class="page-wrapper">

    <div class="page-header">
        <div class="page-title">Notifications</div>
        <form th:if="${!#lists.isEmpty(notifications)}" th:action="@{/notifications/markAllRead}" method="post">
            <button type="submit" class="btn-mark-all">Mark all as read</button>
        </form>
    </div>

    <!-- List -->
    <div class="notif-list" th:if="${!#lists.isEmpty(notifications)}">
        <a th:each="n : ${notifications}"
           th:href="${n.post != null ? '/viewOtherUsersPosts' : '/notifications'}"
           th:classappend="${!n.read ? 'unread' : ''}"
           class="notif-card">

            <div th:classappend="${n.type == 'LIKE' ? 'like' : 'comment'}" class="notif-icon">
                <span th:if="${n.type == 'LIKE'}">❤️</span>
                <span th:if="${n.type == 'COMMENT'}">💬</span>
            </div>

            <div class="notif-body">
                <div class="notif-message" th:text="${n.message}">Notification message</div>
                <div class="notif-time"
                     th:text="${#temporals.format(n.createdAt, 'MMM d, yyyy · h:mm a')}">Just now</div>
            </div>

            <div class="unread-dot" th:if="${!n.read}"></div>
        </a>
    </div>

    <!-- Empty state -->
    <div class="empty-state" th:if="${#lists.isEmpty(notifications)}">
        <div class="empty-icon">🔔</div>
        <div class="empty-title">You're all caught up!</div>
        <div class="empty-sub">Likes and comments on your posts will appear here.</div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/sse-notifications.js"></script>
</body>
</html>
