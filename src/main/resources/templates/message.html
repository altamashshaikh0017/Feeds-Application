<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feeds</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #0a0a0f 0%, #0d0d1a 30%, #0a0f1a 60%, #0a0a0f 100%);
        min-height: 100vh;
        display: flex; align-items: center; justify-content: center;
        padding: 24px; overflow: hidden;
    }

    .blob {
        position: fixed; border-radius: 50%; filter: blur(90px);
        opacity: 0.18; pointer-events: none; z-index: 0;
        animation: drift 18s ease-in-out infinite alternate;
    }
    .blob-1 { width: 500px; height: 500px; background: #6366f1; top: -140px; left: -140px; animation-delay: 0s; }
    .blob-2 { width: 360px; height: 360px; background: #8b5cf6; bottom: -90px; right: -90px; animation-delay: -7s; }
    .blob-3 { width: 240px; height: 240px; background: #06b6d4; top: 48%; left: 56%; animation-delay: -13s; }
    @keyframes drift {
        0%   { transform: translate(0, 0) scale(1); }
        100% { transform: translate(35px, 25px) scale(1.08); }
    }

    body::before {
        content: '';
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
        background-size: 28px 28px;
    }

    .auth-card {
        position: relative; z-index: 1;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        backdrop-filter: blur(28px);
        border-radius: 24px;
        padding: 44px 40px 36px;
        width: 100%; max-width: 420px;
        text-align: center;
        animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
        display: flex; align-items: center; gap: 10px;
        justify-content: center; margin-bottom: 28px;
    }
    .brand-icon {
        width: 38px; height: 38px; border-radius: 10px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        display: flex; align-items: center; justify-content: center;
        font-size: 18px; box-shadow: 0 4px 14px rgba(99,102,241,0.4);
    }
    .brand-name {
        font-size: 1.5rem; font-weight: 800;
        background: linear-gradient(135deg, #818cf8, #c084fc);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text; letter-spacing: -0.5px;
    }

    .success-circle {
        width: 64px; height: 64px; border-radius: 50%;
        background: rgba(34,197,94,0.12);
        border: 1px solid rgba(34,197,94,0.3);
        display: flex; align-items: center; justify-content: center;
        font-size: 1.8rem; margin: 0 auto 20px;
        animation: popIn 0.4s ease 0.2s both;
    }
    @keyframes popIn {
        from { transform: scale(0.6); opacity: 0; }
        to   { transform: scale(1); opacity: 1; }
    }

    .msg-heading {
        font-size: 1.2rem; font-weight: 700; color: #fff; margin-bottom: 10px;
    }
    .msg-body {
        font-size: 0.85rem; color: rgba(255,255,255,0.5);
        line-height: 1.6; margin-bottom: 28px;
    }

    .btn-login {
        display: inline-block;
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        color: #fff; font-weight: 700; font-size: 0.88rem;
        font-family: inherit; border-radius: 12px;
        padding: 12px 32px; text-decoration: none; letter-spacing: 0.3px;
        box-shadow: 0 4px 18px rgba(99,102,241,0.35);
        transition: opacity 0.2s, transform 0.15s;
    }
    .btn-login:hover { opacity: 0.9; transform: translateY(-1px); color: #fff; }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="auth-card">

    <div class="brand">
        <div class="brand-icon">✦</div>
        <div class="brand-name">Feeds</div>
    </div>

    <div class="success-circle">&#10003;</div>

    <div class="msg-heading">You're all set</div>
    <div class="msg-body" th:text="${message}">Your request has been processed.</div>

    <a href="/login" class="btn-login">Go to Sign In</a>

</div>
</body>
</html>
