<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Feeds</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #0a0a0f 0%, #0d0d1a 30%, #0a0f1a 60%, #0a0a0f 100%);
        min-height: 100vh;
        display: flex; align-items: center; justify-content: center;
        padding: 24px; overflow: hidden;
    }

    .blob {
        position: fixed; border-radius: 50%; filter: blur(90px);
        opacity: 0.18; pointer-events: none; z-index: 0;
        animation: drift 18s ease-in-out infinite alternate;
    }
    .blob-1 { width: 500px; height: 500px; background: #6366f1; top: -140px; right: -130px; animation-delay: 0s; }
    .blob-2 { width: 360px; height: 360px; background: #06b6d4; bottom: -90px; left: -90px; animation-delay: -7s; }
    .blob-3 { width: 250px; height: 250px; background: #8b5cf6; top: 45%; left: 40%; animation-delay: -13s; }
    @keyframes drift {
        0%   { transform: translate(0, 0) scale(1); }
        100% { transform: translate(35px, 25px) scale(1.08); }
    }

    body::before {
        content: '';
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
        background-size: 28px 28px;
    }

    /* ── Card ── */
    .auth-card {
        position: relative; z-index: 1;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        backdrop-filter: blur(28px);
        border-radius: 24px;
        padding: 44px 40px 36px;
        width: 100%; max-width: 420px;
        animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Brand ── */
    .brand {
        display: flex; align-items: center; gap: 10px;
        justify-content: center; margin-bottom: 28px;
    }
    .brand-icon {
        width: 38px; height: 38px; border-radius: 10px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        display: flex; align-items: center; justify-content: center;
        font-size: 18px; box-shadow: 0 4px 14px rgba(99,102,241,0.4);
    }
    .brand-name {
        font-size: 1.5rem; font-weight: 800;
        background: linear-gradient(135deg, #818cf8, #c084fc);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text; letter-spacing: -0.5px;
    }

    /* ── Icon circle ── */
    .icon-circle {
        width: 60px; height: 60px; border-radius: 50%;
        background: rgba(99,102,241,0.12);
        border: 1px solid rgba(99,102,241,0.25);
        display: flex; align-items: center; justify-content: center;
        font-size: 1.6rem; margin: 0 auto 20px;
    }

    .auth-heading { font-size: 1.25rem; font-weight: 700; color: #fff; text-align: center; margin-bottom: 6px; }
    .auth-sub { font-size: 0.82rem; color: rgba(255,255,255,0.4); text-align: center; margin-bottom: 28px; }

    /* ── Alert ── */
    .alert-glass {
        border-radius: 10px; font-size: 0.81rem; font-weight: 500;
        padding: 11px 14px; margin-bottom: 20px;
        display: flex; align-items: center; gap: 8px;
    }
    .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #f87171; }

    /* ── Form ── */
    .form-group { margin-bottom: 16px; }
    .form-label {
        display: block; font-size: 0.78rem; font-weight: 600;
        color: rgba(255,255,255,0.55); margin-bottom: 6px;
    }
    .form-input {
        width: 100%;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 10px;
        color: #fff; font-size: 0.88rem; font-family: inherit;
        padding: 11px 14px;
        outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input::placeholder { color: rgba(255,255,255,0.22); }
    .form-input:focus {
        border-color: rgba(99,102,241,0.6);
        box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        background: rgba(255,255,255,0.07);
    }
    .form-input.input-error { border-color: rgba(239,68,68,0.5); }

    .pw-hint { font-size: 0.75rem; color: #f87171; margin-top: 5px; display: none; }

    /* ── Strength bar ── */
    .strength-bar-wrap {
        margin-top: 8px; height: 4px; border-radius: 4px;
        background: rgba(255,255,255,0.08); overflow: hidden;
    }
    .strength-bar {
        height: 100%; border-radius: 4px; width: 0%;
        transition: width 0.3s, background 0.3s;
    }
    .strength-label {
        font-size: 0.7rem; color: rgba(255,255,255,0.35);
        margin-top: 4px; min-height: 14px;
    }

    /* ── Button ── */
    .btn-submit {
        width: 100%; margin-top: 8px;
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        color: #fff; border: none; font-weight: 700; font-size: 0.9rem;
        font-family: inherit; border-radius: 12px;
        padding: 13px; cursor: pointer; letter-spacing: 0.3px;
        box-shadow: 0 4px 18px rgba(99,102,241,0.35);
        transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-submit:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(99,102,241,0.45); }
    .btn-submit:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Divider ── */
    .divider { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 24px 0; }

    /* ── Footer link ── */
    .auth-link {
        display: block; text-align: center;
        font-size: 0.8rem; color: rgba(255,255,255,0.45); text-decoration: none;
        transition: color 0.2s;
    }
    .auth-link span { color: #818cf8; font-weight: 600; }
    .auth-link:hover { color: rgba(255,255,255,0.75); }
    .auth-link:hover span { color: #a5b4fc; }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="auth-card">

    <div class="brand">
        <div class="brand-icon">✦</div>
        <div class="brand-name">Feeds</div>
    </div>

    <div class="icon-circle">&#128273;</div>

    <div class="auth-heading">Set a new password</div>
    <div class="auth-sub">Choose a strong password for your account.</div>

    <div th:if="${error}" class="alert-glass alert-error">
        <span>&#10007;</span> <span th:text="${error}"></span>
    </div>

    <form action="/reset-password" method="post" id="resetForm">
        <input type="hidden" name="token" th:value="${token}" />

        <div class="form-group">
            <label class="form-label">New Password</label>
            <input type="password" name="password" id="password" class="form-input"
                   placeholder="At least 6 characters" required autocomplete="new-password" />
            <div class="strength-bar-wrap">
                <div class="strength-bar" id="strengthBar"></div>
            </div>
            <div class="strength-label" id="strengthLabel"></div>
        </div>

        <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input type="password" id="confirmPassword" class="form-input"
                   placeholder="Re-enter your password" autocomplete="new-password" />
            <div class="pw-hint" id="pw-mismatch">Passwords do not match.</div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Reset Password</button>
    </form>

    <hr class="divider" />

    <a href="/login" class="auth-link">&#8592; Back to <span>Sign In</span></a>

</div>

<script>
    const pwInput   = document.getElementById('password');
    const confInput = document.getElementById('confirmPassword');
    const mismatch  = document.getElementById('pw-mismatch');
    const submitBtn = document.getElementById('submitBtn');
    const bar       = document.getElementById('strengthBar');
    const label     = document.getElementById('strengthLabel');

    function strength(pw) {
        let score = 0;
        if (pw.length >= 6)  score++;
        if (pw.length >= 10) score++;
        if (/[A-Z]/.test(pw)) score++;
        if (/[0-9]/.test(pw)) score++;
        if (/[^A-Za-z0-9]/.test(pw)) score++;
        return score;
    }

    const levels = [
        { pct: '0%',   color: 'transparent', text: '' },
        { pct: '25%',  color: '#ef4444',     text: 'Weak' },
        { pct: '50%',  color: '#f59e0b',     text: 'Fair' },
        { pct: '75%',  color: '#06b6d4',     text: 'Good' },
        { pct: '90%',  color: '#22c55e',     text: 'Strong' },
        { pct: '100%', color: '#4ade80',     text: 'Very strong' },
    ];

    pwInput.addEventListener('input', function () {
        const s = strength(this.value);
        const l = levels[Math.min(s, 5)];
        bar.style.width      = this.value ? l.pct : '0%';
        bar.style.background = l.color;
        label.textContent    = this.value ? l.text : '';
        label.style.color    = l.color;
        validate();
    });

    confInput.addEventListener('input', validate);

    function validate() {
        const mism = confInput.value.length > 0 && pwInput.value !== confInput.value;
        mismatch.style.display = mism ? 'block' : 'none';
        confInput.classList.toggle('input-error', mism);
        submitBtn.disabled = mism;
    }
</script>
</body>
</html>
