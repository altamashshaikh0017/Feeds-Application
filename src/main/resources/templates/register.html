<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — Feeds</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #0a0a0f 0%, #0d0d1a 30%, #0a0f1a 60%, #0a0a0f 100%);
        min-height: 100vh;
        display: flex; align-items: center; justify-content: center;
        padding: 32px 24px;
        overflow-x: hidden;
    }

    /* ── Blobs ── */
    .blob {
        position: fixed; border-radius: 50%; filter: blur(90px);
        opacity: 0.18; pointer-events: none; z-index: 0;
        animation: drift 18s ease-in-out infinite alternate;
    }
    .blob-1 { width: 520px; height: 520px; background: #6366f1; top: -150px; right: -120px; animation-delay: 0s; }
    .blob-2 { width: 380px; height: 380px; background: #06b6d4; bottom: -100px; left: -100px; animation-delay: -8s; }
    .blob-3 { width: 260px; height: 260px; background: #8b5cf6; top: 40%; left: 40%; animation-delay: -14s; }
    @keyframes drift {
        0%   { transform: translate(0, 0) scale(1); }
        100% { transform: translate(30px, 25px) scale(1.07); }
    }

    body::before {
        content: '';
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
        background-size: 28px 28px;
    }

    /* ── Card ── */
    .auth-card {
        position: relative; z-index: 1;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        backdrop-filter: blur(28px);
        border-radius: 24px;
        padding: 44px 40px 36px;
        width: 100%; max-width: 520px;
        animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Brand ── */
    .brand {
        display: flex; align-items: center; gap: 10px;
        justify-content: center; margin-bottom: 28px;
    }
    .brand-icon {
        width: 38px; height: 38px; border-radius: 10px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        display: flex; align-items: center; justify-content: center;
        font-size: 18px; box-shadow: 0 4px 14px rgba(99,102,241,0.4);
    }
    .brand-name {
        font-size: 1.5rem; font-weight: 800;
        background: linear-gradient(135deg, #818cf8, #c084fc);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text; letter-spacing: -0.5px;
    }

    /* ── Heading ── */
    .auth-heading { font-size: 1.3rem; font-weight: 700; color: #fff; text-align: center; margin-bottom: 4px; }
    .auth-sub { font-size: 0.82rem; color: rgba(255,255,255,0.4); text-align: center; margin-bottom: 28px; }

    /* ── Alert ── */
    .alert-glass {
        border-radius: 10px; font-size: 0.81rem; font-weight: 500;
        padding: 11px 14px; margin-bottom: 20px;
        display: flex; align-items: center; gap: 8px;
    }
    .alert-error   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.25);  color: #f87171; }
    .alert-success { background: rgba(34,197,94,0.1);  border: 1px solid rgba(34,197,94,0.25);  color: #4ade80; }

    /* ── Form ── */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { margin-bottom: 16px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-label {
        display: block; font-size: 0.78rem; font-weight: 600;
        color: rgba(255,255,255,0.55); margin-bottom: 6px;
    }
    .form-input, .form-select {
        width: 100%;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 10px;
        color: #fff; font-size: 0.88rem; font-family: inherit;
        padding: 11px 14px;
        outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        appearance: none;
    }
    .form-input::placeholder { color: rgba(255,255,255,0.22); }
    .form-input:focus, .form-select:focus {
        border-color: rgba(99,102,241,0.6);
        box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        background: rgba(255,255,255,0.07);
    }
    .form-select option { background: #1a1a2e; color: #fff; }

    /* custom select arrow */
    .select-wrapper { position: relative; }
    .select-wrapper::after {
        content: '▾'; position: absolute; right: 13px; top: 50%;
        transform: translateY(-50%); color: rgba(255,255,255,0.4);
        pointer-events: none; font-size: 0.85rem;
    }

    /* ── Role pills ── */
    .role-options { display: flex; gap: 10px; }
    .role-option { flex: 1; }
    .role-option input[type="radio"] { display: none; }
    .role-option label {
        display: flex; align-items: center; justify-content: center; gap: 6px;
        padding: 10px; border-radius: 10px; cursor: pointer;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(255,255,255,0.04);
        font-size: 0.82rem; font-weight: 600; color: rgba(255,255,255,0.45);
        transition: all 0.2s; user-select: none;
    }
    .role-option input[type="radio"]:checked + label {
        border-color: rgba(99,102,241,0.6);
        background: rgba(99,102,241,0.12);
        color: #818cf8;
        box-shadow: 0 0 0 2px rgba(99,102,241,0.15);
    }
    .role-option.admin input[type="radio"]:checked + label {
        border-color: rgba(245,158,11,0.6);
        background: rgba(245,158,11,0.12);
        color: #fbbf24;
        box-shadow: 0 0 0 2px rgba(245,158,11,0.15);
    }

    /* ── Button ── */
    .btn-submit {
        width: 100%; margin-top: 8px;
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        color: #fff; border: none; font-weight: 700; font-size: 0.9rem;
        font-family: inherit; border-radius: 12px;
        padding: 13px; cursor: pointer; letter-spacing: 0.3px;
        box-shadow: 0 4px 18px rgba(99,102,241,0.35);
        transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(99,102,241,0.45); }

    /* ── Divider ── */
    .divider { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 24px 0; }

    /* ── Footer link ── */
    .auth-link {
        display: block; text-align: center;
        font-size: 0.8rem; color: rgba(255,255,255,0.45); text-decoration: none;
        transition: color 0.2s;
    }
    .auth-link span { color: #818cf8; font-weight: 600; }
    .auth-link:hover { color: rgba(255,255,255,0.75); }
    .auth-link:hover span { color: #a5b4fc; }

    @media (max-width: 480px) {
        .auth-card { padding: 32px 22px 28px; }
        .form-row { grid-template-columns: 1fr; }
    }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="auth-card">

    <!-- Brand -->
    <div class="brand">
        <div class="brand-icon">✦</div>
        <div class="brand-name">Feeds</div>
    </div>

    <div class="auth-heading">Create an account</div>
    <div class="auth-sub">Join the community and start sharing your thoughts</div>

    <!-- Alerts -->
    <div th:if="${error}"   class="alert-glass alert-error">
        <span>&#10007;</span> <span th:text="${error}"></span>
    </div>
    <div th:if="${message}" class="alert-glass alert-success">
        <span>&#10003;</span> <span th:text="${message}"></span>
    </div>

    <!-- Form -->
    <form th:action="@{/signUp}" th:object="${admin}" method="post">

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" th:field="*{name}" class="form-input" placeholder="John Doe" required />
            </div>
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" th:field="*{username}" class="form-input" placeholder="johndoe" required />
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" th:field="*{email}" class="form-input" placeholder="you@example.com" required />
            </div>
            <div class="form-group">
                <label class="form-label">Contact Number</label>
                <input type="text" th:field="*{contactNumber}" class="form-input" placeholder="+1 234 567 8900" required />
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" th:field="*{password}" class="form-input" placeholder="At least 6 characters" required autocomplete="new-password" />
        </div>

        <div class="form-group">
            <label class="form-label">Account Type</label>
            <div class="role-options">
                <div class="role-option">
                    <input type="radio" th:field="*{role}" id="role-user" value="USER" />
                    <label for="role-user">&#128100; User</label>
                </div>
                <div class="role-option admin">
                    <input type="radio" th:field="*{role}" id="role-admin" value="ADMIN" />
                    <label for="role-admin">&#9881; Admin</label>
                </div>
            </div>
        </div>

        <button type="submit" class="btn-submit">Create Account</button>
    </form>

    <hr class="divider" />

    <a href="/login" class="auth-link">Already have an account? <span>Sign in</span></a>

</div>
</body>
</html>
