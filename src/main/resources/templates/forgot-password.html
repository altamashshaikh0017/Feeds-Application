<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — Feeds</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #0a0a0f 0%, #0d0d1a 30%, #0a0f1a 60%, #0a0a0f 100%);
        min-height: 100vh;
        display: flex; align-items: center; justify-content: center;
        padding: 24px; overflow: hidden;
    }

    .blob {
        position: fixed; border-radius: 50%; filter: blur(90px);
        opacity: 0.18; pointer-events: none; z-index: 0;
        animation: drift 18s ease-in-out infinite alternate;
    }
    .blob-1 { width: 520px; height: 520px; background: #6366f1; top: -150px; left: -150px; animation-delay: 0s; }
    .blob-2 { width: 380px; height: 380px; background: #8b5cf6; bottom: -100px; right: -100px; animation-delay: -7s; }
    .blob-3 { width: 260px; height: 260px; background: #06b6d4; top: 50%; left: 58%; animation-delay: -13s; }
    @keyframes drift {
        0%   { transform: translate(0, 0) scale(1); }
        100% { transform: translate(35px, 25px) scale(1.08); }
    }

    body::before {
        content: '';
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
        background-size: 28px 28px;
    }

    /* ── Card ── */
    .auth-card {
        position: relative; z-index: 1;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        backdrop-filter: blur(28px);
        border-radius: 24px;
        padding: 44px 40px 36px;
        width: 100%; max-width: 420px;
        animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Brand ── */
    .brand {
        display: flex; align-items: center; gap: 10px;
        justify-content: center; margin-bottom: 28px;
    }
    .brand-icon {
        width: 38px; height: 38px; border-radius: 10px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        display: flex; align-items: center; justify-content: center;
        font-size: 18px; box-shadow: 0 4px 14px rgba(99,102,241,0.4);
    }
    .brand-name {
        font-size: 1.5rem; font-weight: 800;
        background: linear-gradient(135deg, #818cf8, #c084fc);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text; letter-spacing: -0.5px;
    }

    /* ── Icon circle ── */
    .icon-circle {
        width: 60px; height: 60px; border-radius: 50%;
        background: rgba(99,102,241,0.12);
        border: 1px solid rgba(99,102,241,0.25);
        display: flex; align-items: center; justify-content: center;
        font-size: 1.6rem; margin: 0 auto 20px;
    }

    .auth-heading { font-size: 1.25rem; font-weight: 700; color: #fff; text-align: center; margin-bottom: 6px; }
    .auth-sub { font-size: 0.82rem; color: rgba(255,255,255,0.4); text-align: center; margin-bottom: 28px; line-height: 1.5; }

    /* ── Alert ── */
    .alert-glass {
        border-radius: 10px; font-size: 0.81rem; font-weight: 500;
        padding: 11px 14px; margin-bottom: 20px;
        display: flex; align-items: center; gap: 8px;
    }
    .alert-error   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.25);  color: #f87171; }

    /* ── Form ── */
    .form-group { margin-bottom: 18px; }
    .form-label {
        display: block; font-size: 0.78rem; font-weight: 600;
        color: rgba(255,255,255,0.55); margin-bottom: 6px;
    }
    .form-input {
        width: 100%;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 10px;
        color: #fff; font-size: 0.88rem; font-family: inherit;
        padding: 11px 14px;
        outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input::placeholder { color: rgba(255,255,255,0.22); }
    .form-input:focus {
        border-color: rgba(99,102,241,0.6);
        box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        background: rgba(255,255,255,0.07);
    }

    /* ── Button ── */
    .btn-submit {
        width: 100%;
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        color: #fff; border: none; font-weight: 700; font-size: 0.9rem;
        font-family: inherit; border-radius: 12px;
        padding: 13px; cursor: pointer; letter-spacing: 0.3px;
        box-shadow: 0 4px 18px rgba(99,102,241,0.35);
        transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
        display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-submit:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(99,102,241,0.45); }
    .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; }

    /* ── Spinner (inside button) ── */
    .btn-spinner {
        display: none; width: 16px; height: 16px;
        border: 2px solid rgba(255,255,255,0.4);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Divider ── */
    .divider { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 24px 0; }

    /* ── Footer link ── */
    .auth-link {
        display: block; text-align: center;
        font-size: 0.8rem; color: rgba(255,255,255,0.45); text-decoration: none;
        transition: color 0.2s;
    }
    .auth-link span { color: #818cf8; font-weight: 600; }
    .auth-link:hover { color: rgba(255,255,255,0.75); }
    .auth-link:hover span { color: #a5b4fc; }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="auth-card">

    <div class="brand">
        <div class="brand-icon">✦</div>
        <div class="brand-name">Feeds</div>
    </div>

    <div class="icon-circle">&#128274;</div>

    <div class="auth-heading">Forgot your password?</div>
    <div class="auth-sub">Enter your registered email and we'll send you a link to reset your password.</div>

    <div th:if="${error}" class="alert-glass alert-error">
        <span>&#10007;</span> <span th:text="${error}"></span>
    </div>

    <form action="/forgot-password" method="post" id="forgotForm">
        <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-input" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">
            <span class="btn-spinner" id="btnSpinner"></span>
            <span id="btnText">Send Reset Link</span>
        </button>
    </form>

    <hr class="divider" />

    <a href="/login" class="auth-link">&#8592; Back to <span>Sign In</span></a>

</div>

<script>
    document.getElementById('forgotForm').addEventListener('submit', function () {
        const btn     = document.getElementById('submitBtn');
        const spinner = document.getElementById('btnSpinner');
        const text    = document.getElementById('btnText');
        btn.disabled       = true;
        spinner.style.display = 'block';
        text.textContent   = 'Sending…';
    });
</script>
</body>
</html>
